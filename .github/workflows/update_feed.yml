name: MTA Discord Alerter

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes (adjust to your liking)
  workflow_dispatch:      # Lets you run it manually from GitHub

jobs:
  check-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ---> PUT IT RIGHT HERE! <---
      - name: Install dependencies
        run: |
          pip install requests pillow
          
      - name: Run MTA alert script and save history
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py
          git config --global user.name "github-actions-bot"
          git config --global user.email "actions@github.com"
          git add seen_alerts.txt
          git diff-index --quiet HEAD || git commit -m "Update alert history log"
          git pull --rebase origin main
          git push origin main
