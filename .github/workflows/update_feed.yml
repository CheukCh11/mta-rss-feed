name: Update MTA RSS Feed

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run MTA Scraper Script
      run: python mta_scraper.py

    - name: Commit and push changes back to GitHub
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add mta_subway_alerts.xml
        git diff-index --quiet HEAD || git commit -m "Update subway alerts feed"
        # The FIX: Pull changes first to avoid conflicts
        git pull --rebase origin main
        git push origin main
